name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # --- STEP 1: RUN API TESTS ---
  api-tests:
    name: "API Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run API Tests
        run: npx playwright test --project=api-tests --reporter=blob --reporter=allure-playwright
      - name: Upload API blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-blob-reports-api
          path: blob-report
          retention-days: 1

      - name: Upload API allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results
          retention-days: 1

  # --- STEP 2: RUN UI TESTS IN PARALLEL ---
  ui-tests:
    name: "UI Parallel Tests"
    needs: api-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright UI tests
        # Excluding @visual and @ai-healing to keep CI metrics stable
        run: npx playwright test --grep-invert "@visual|@api|@ai-healing" --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --reporter=blob --reporter=allure-playwright

      - name: Upload UI blob reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-blob-reports-ui-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1

      - name: Upload allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui-${{ matrix.shardIndex }}
          path: allure-results
          retention-days: 1

  # --- STEP 3: MERGE & PERSIST TRENDS ---
  merge-reports:
    if: always()
    needs: [api-tests, ui-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        id: download-blobs
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: all-blob-reports
          pattern: all-blob-reports-*
          merge-multiple: true

      - name: Prepare blob reports for merge
        run: |
          mkdir -p all-blob-reports blob-reports-merged
          find all-blob-reports -name "*.zip" -exec cp {} blob-reports-merged/ \; 2>/dev/null || true
          rm -rf all-blob-reports
          mv blob-reports-merged all-blob-reports

      - name: Download all allure-results
        uses: actions/download-artifact@v4
        with:
          path: all-allure-results
          pattern: allure-results-*
          merge-multiple: true

      - name: Fetch historical trends from gh-pages
        run: |
          mkdir -p data
          TRENDS_URL="https://${GITHUB_REPOSITORY%%/*}.github.io/${GITHUB_REPOSITORY#*/}/data/trends.json"
          curl -fsSL "$TRENDS_URL" -o data/trends.json || echo "No previous trends found. Starting a new history."

      - name: Merge into JSON for metrics
        run: |
          if [ -z "$(ls -A all-blob-reports 2>/dev/null)" ]; then
            echo '{"config":{},"suites":[]}' > test-results.json
            echo "No blob reports found, created minimal test-results.json"
          else
            npx playwright merge-reports --config=merge.config.ts ./all-blob-reports
          fi

      - name: Run metrics and update trends
        run: |
          npm run metrics || echo "Metrics failed, continuing..."
          npm run trends || echo "Trends failed, continuing..."

      - name: Consolidate Allure Results
        run: |
          # merge-multiple (v4) puts files flat in all-allure-results; copy into allure-results
          mkdir -p allure-results
          cp -r all-allure-results/. allure-results/ 2>/dev/null || true

      - name: Fetch Allure history from gh-pages
        run: |
          mkdir -p allure-results/history
          BASE="https://${GITHUB_REPOSITORY%%/*}.github.io/${GITHUB_REPOSITORY#*/}"
          for f in history.json history-trend.json categories-trend.json duration-trend.json retry-trend.json; do
            curl -fsSL "$BASE/history/$f" -o "allure-results/history/$f" 2>/dev/null || true
          done

      - name: Generate Allure report
        run: |
          npx ts-node scripts/write-allure-env.ts || true
          rm -rf allure-report
          npx allure generate ./allure-results -o allure-report || true
          npm run trends:chart || true
          if [ ! -f allure-report/index.html ]; then
            npx playwright merge-reports --reporter html ./all-blob-reports
            cp -r playwright-report allure-report
          fi

      - name: Bundle trends data into report
        run: |
          mkdir -p allure-report/data
          [ -f data/trends.json ] && cp data/trends.json allure-report/data/trends.json || true

      - name: 🚀 Setup Pages
        uses: actions/configure-pages@v5

      - name: 📦 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
